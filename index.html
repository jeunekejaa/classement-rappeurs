<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bias Sorter - Rappeurs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="sorter-container">
        <h1>Bias Sorter - Rappeurs</h1>
        <p class="instructions">
            Choisissez qui vous préférez entre les deux pour obtenir votre classement. <br>
            Utiliser les boutons du milieu affectera la précision des résultats.
        </p>

        <div id="progress-area" style="text-align:center;"><b>battle #1<br>0% sorted.</b></div>

        <table id="main-table">
            <tbody>
                <tr>
                    <td id="left-choice" rowspan="2"></td>
                    <td class="middle-choice" id="tie-choice-1">J'aime les deux également</td>
                    <td id="right-choice" rowspan="2"></td>
                </tr>
                <tr>
                    <td class="middle-choice" id="tie-choice-2">Je n'ai pas d'avis</td>
                </tr>
            </tbody>
        </table>

        <div id="result-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
