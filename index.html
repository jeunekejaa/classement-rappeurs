<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bias Sorter - Rappeurs</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="sorter-container">
        <h1>Bias Sorter - Rappeurs</h1>
        <p class="instructions">
            Choisissez qui vous préférez entre les deux pour obtenir votre classement.
        </p>

        <div id="progress-area" style="text-align:center;"><b>battle #1<br>0% sorted.</b></div>

        <div class="battle-wrapper">
            <button class="choice-btn" id="left-choice"></button>

            <div class="middle-column">
                <button class="tie-btn" id="tie-choice-1">J'aime les deux également</button>
                <button class="tie-btn" id="tie-choice-2">Je n'ai pas d'avis</button>
            </div>

            <button class="choice-btn" id="right-choice"></button>
        </div>

        <div id="result-area"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
